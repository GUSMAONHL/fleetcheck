<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Novo Horizonte — Checklist de Manutenção</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #0b0f14;
  --bg2:      #111820;
  --bg3:      #192030;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #e8edf3;
  --text2:    #8a9ab0;
  --text3:    #3a5070;
  --ok:       #16a050;
  --ok-bg:    rgba(22,160,80,0.12);
  --ok-bdr:   rgba(22,160,80,0.35);
  --atenc:    #d29922;
  --atenc-bg: rgba(210,153,34,0.12);
  --atenc-bdr:rgba(210,153,34,0.35);
  --sub:      #cc2222;
  --sub-bg:   rgba(204,34,34,0.12);
  --sub-bdr:  rgba(204,34,34,0.35);
  --accent:   #2a7fff;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* PHONE SHELL */
.phone-shell { width:390px; min-height:844px; margin:1.5rem auto; background:var(--bg); border-radius:44px; border:8px solid #0a0e13; overflow:hidden; box-shadow:0 0 0 1px #1a2535, 0 24px 80px rgba(0,0,0,0.6); position:relative; }
.notch { width:126px; height:30px; background:#0a0e13; border-radius:0 0 20px 20px; margin:0 auto; }
.screen { display:flex; flex-direction:column; min-height:806px; }
.status-bar { display:flex; justify-content:space-between; align-items:center; padding:4px 22px 6px; font-size:11px; color:#6a8aaa; font-family:'Barlow',sans-serif; }

/* VIEWS */
.view { display:none; flex-direction:column; flex:1; }
.view.active { display:flex; }

/* ── HEADER GERAL ── */
.app-header { background:var(--bg2); border-bottom:1px solid var(--border); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.app-header-logo { height:36px; object-fit:contain; }
.app-header-title { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:600; color:var(--text); letter-spacing:0.5px; text-transform:uppercase; }
.app-header-sub { font-size:10px; color:var(--text3); letter-spacing:0.5px; margin-top:1px; }
.back-btn { background:none; border:none; color:var(--text2); cursor:pointer; font-size:24px; line-height:1; padding:0 6px 0 0; }

/* ── TELA INICIAL ── */
.home-content { flex:1; padding:20px 18px; overflow-y:auto; }
.home-form-card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:16px; }
.form-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; display:flex; align-items:center; gap:4px; }
.form-label span { color:#cc4444; }
.form-input { width:100%; background:var(--bg3); border:1px solid var(--border2); border-radius:10px; padding:12px 14px; color:var(--text); font-size:16px; font-family:'Barlow',sans-serif; outline:none; transition:border-color 0.2s; }
select.form-input option { background:var(--bg3); color:var(--text); }
.form-input:focus { border-color:var(--accent); }
.form-input::placeholder { color:var(--text3); font-size:14px; }
.form-input.error { border-color:#cc2222; background:#1a1010; }
.err-msg { font-size:10px; color:#e05050; margin-top:5px; display:none; }
.err-msg.show { display:block; }



.section-tabs { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px; }
.section-tab { padding:12px 18px; border-radius:12px; border:1px solid var(--border2); background:var(--bg3); color:var(--text2); font-size:14px; font-family:'Barlow Condensed',sans-serif; font-weight:600; cursor:pointer; text-align:center; transition:all 0.15s; letter-spacing:0.5px; text-transform:uppercase; width:100%; }
.section-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

.btn-iniciar { width:100%; padding:16px; background:var(--accent); border:none; border-radius:14px; color:#fff; font-size:16px; font-weight:600; font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; margin-top:4px; transition:background 0.2s; }
.btn-iniciar:hover { background:#1a6be0; }

/* ── CHECKLIST ── */
.checklist-content { flex:1; overflow-y:auto; padding:0 0 20px; }
.eixo-section { padding:0 16px; }
.eixo-header { padding:14px 0 8px; display:flex; align-items:center; gap:8px; }
.eixo-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.eixo-name { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:1px; }
.eixo-prog { font-size:10px; color:var(--text3); margin-left:auto; }
.sep { height:1px; background:var(--border); margin:4px 0 10px; }

/* Item do checklist */
.check-item { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
.check-item-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.check-item-label { font-size:12px; color:var(--text); line-height:1.4; flex:1; }
.check-item-sub { font-size:10px; color:var(--text3); margin-top:2px; }

/* Botões OK / Atenção / Substituir */
.trio-group { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.trio-btn { width:82px; padding:5px 0; border-radius:8px; border:1px solid; cursor:pointer; font-size:10px; font-weight:600; font-family:'Barlow',sans-serif; text-align:center; transition:all 0.15s; background:transparent; white-space:nowrap; }
.trio-ok  { border-color:rgba(22,160,80,0.4); color:#2ea060; }
.trio-ok.active  { background:var(--ok); border-color:var(--ok); color:#fff; }
.trio-at  { border-color:rgba(210,153,34,0.4); color:#c09020; }
.trio-at.active  { background:var(--atenc); border-color:var(--atenc); color:#fff; }
.trio-sub { border-color:rgba(204,34,34,0.4); color:#c03030; }
.trio-sub.active { background:var(--sub); border-color:var(--sub); color:#fff; }
.trio-na  { border-color:rgba(100,100,120,0.4); color:#5a6070; }
.trio-na.active  { background:#2a2f3a; border-color:#5a6070; color:#a0aab8; }

.obs-box { margin-top:8px; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:8px 12px; display:none; }
.obs-box.show { display:block; }
.obs-input { width:100%; background:transparent; border:none; outline:none; color:var(--text2); font-size:12px; font-family:'Barlow',sans-serif; resize:none; line-height:1.5; text-transform:uppercase; }
.obs-input::placeholder { color:var(--text3); }

/* Campo numérico especial (TDI) */
.num-input { width:70px; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:6px 8px; color:var(--text); font-size:13px; font-family:'Barlow',sans-serif; outline:none; text-align:center; flex-shrink:0; }
.num-input:focus { border-color:var(--accent); }

/* Progress bar */
.progress-bar { height:3px; background:var(--bg3); margin:0; }
.progress-fill { height:100%; background:var(--accent); transition:width 0.4s; }

/* Botão finalizar */
.btn-finalizar { width:calc(100% - 32px); margin:12px 16px 0; padding:15px; background:#0d5c38; border:2px solid var(--ok); border-radius:14px; color:#fff; font-size:15px; font-weight:600; font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }

/* ── MODAL CONFIRMAÇÃO ── */
.modal-overlay { display:none; position:absolute; inset:0; background:rgba(5,10,20,0.9); z-index:100; align-items:flex-end; }
.modal-overlay.show { display:flex; }
.modal-sheet { background:var(--bg2); border-radius:22px 22px 0 0; border:1px solid var(--border2); border-bottom:none; width:100%; max-height:88%; display:flex; flex-direction:column; overflow:hidden; }
.modal-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
.modal-header { padding:14px 18px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.modal-title { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:600; color:var(--text); text-transform:uppercase; letter-spacing:0.5px; }
.modal-sub { font-size:11px; color:var(--text3); margin-top:3px; }
.modal-body { overflow-y:auto; flex:1; padding:14px 18px; }
.modal-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:16px; }
.mstat { border-radius:10px; padding:10px 8px; text-align:center; border:1px solid; }
.mstat-num { font-size:22px; font-weight:700; font-family:'Barlow Condensed',sans-serif; }
.mstat-lbl { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
.mstat.ok  { background:var(--ok-bg); border-color:var(--ok-bdr); color:var(--ok); }
.mstat.at  { background:var(--atenc-bg); border-color:var(--atenc-bdr); color:var(--atenc); }
.mstat.sub { background:var(--sub-bg); border-color:var(--sub-bdr); color:var(--sub); }
.modal-section-title { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.modal-item { background:var(--bg3); border-radius:10px; padding:10px 12px; margin-bottom:6px; border-left:3px solid; }
.modal-item.at  { border-color:var(--atenc); }
.modal-item.sub { border-color:var(--sub); }
.modal-item-cat { font-size:10px; color:var(--text3); text-transform:uppercase; margin-bottom:3px; }
.modal-item-label { font-size:12px; color:var(--text); }
.modal-item-obs { font-size:11px; color:var(--text3); font-style:italic; margin-top:4px; }
.modal-actions { padding:12px 18px 20px; border-top:1px solid var(--border); flex-shrink:0; display:flex; flex-direction:column; gap:8px; }
.mbtn { width:100%; padding:14px; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Barlow Condensed',sans-serif; border:none; letter-spacing:0.5px; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:8px; }
.mbtn-send   { background:var(--ok); color:#fff; }
.mbtn-review { background:var(--bg3); color:var(--text2); border:1px solid var(--border2); }
.mbtn-cancel { background:transparent; color:var(--text3); font-size:13px; }

/* ── SUCESSO ── */
.success-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; text-align:center; background:var(--bg); }
.success-icon { width:80px; height:80px; background:var(--ok-bg); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:20px; border:2px solid var(--ok); }
.success-title { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:700; color:#2ed47a; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.success-sub { font-size:13px; color:var(--text3); line-height:1.6; margin-bottom:24px; }
.success-card { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:14px 16px; width:100%; text-align:left; margin-bottom:20px; }
.success-row { display:flex; justify-content:space-between; padding:5px 0; font-size:12px; border-bottom:1px solid var(--border); }
.success-row:last-child { border-bottom:none; }
.success-row span:first-child { color:var(--text3); }
.success-row span:last-child { color:var(--text); font-weight:500; }
.btn-novo { width:100%; padding:14px; background:var(--accent); border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:600; font-family:'Barlow Condensed',sans-serif; text-transform:uppercase; letter-spacing:1px; cursor:pointer; margin-bottom:0; display:block; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }
</style>
</head>

// ══ ESTADO ══
const state = {};   // id -> 'ok'|'at'|'sub'|null
const obsMap = {};  // id -> string
const numMap = {};  // id -> {fogo, tdi, estrutura}
let secoesAtivas = ['freios','pneus'];
let tipoVeiculo = '';
let totalItens = 0;
let moduloAtual = 0;
const MODULOS_DISPONIVEIS = [
  { mods:'freios',      label:'FREIOS',    icon:'🔧', sub:'Inspeção de freios por eixo' },
  { mods:'pneus',       label:'PNEUS',     icon:'⚫', sub:'TDI, estrutura e numeração' },
  { mods:'transmissao', label:'SUSPENSÃO', icon:'⚙️', sub:'Transmissão e suspensão por eixo' },
];
let modulosFeitos = []; // ex: ['freios','pneus']

function contarItens() {
  let t = 0;
  secoesAtivas.forEach(sec => {
    ESTRUTURA[sec].eixos.forEach(e => t += e.itens.length);
  });
  return t;
}

function countState() {
  let ok=0, at=0, sub=0, na=0, pend=0;
  Object.values(state).forEach(v => {
    if(v==='ok') ok++;
    else if(v==='at') at++;
    else if(v==='sub') sub++;
    else if(v==='na') na++;
    else pend++;
  });
  return {ok,at,sub,na,pend};
}

// ══ NAVEGAÇÃO ══
function show(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
window.show = show;

// back movido

// ══ HOME ══
window.selecionarTipo = function(btn) {
  btn.classList.add('active');
  tipoVeiculo = btn.getAttribute('data-tipo');
};

window.toggleSecao = function(btn) {
  const sec = btn.getAttribute('data-sec');
  btn.classList.toggle('active');
  secoesAtivas = [...document.querySelectorAll('.section-tab.active')].map(b=>b.getAttribute('data-sec'));
};

window.limparErro = function(campo) {
  document.getElementById('err-'+campo).classList.remove('show');
  document.getElementById(campo+'-input').classList.remove('error');
};

// Define data padrão = hoje
document.getElementById('data-input').value = new Date().toISOString().slice(0,10);

// listeners adicionados no fim do script

window.iniciarChecklist = function() {
  const placa = document.getElementById('placa-input').value.trim();
  const data  = document.getElementById('data-input').value;
  let erros = false;
  if(!placa) { document.getElementById('err-placa').classList.add('show'); document.getElementById('placa-input').classList.add('error'); erros=true; }
  if(!data)  { document.getElementById('err-data').classList.add('show');  document.getElementById('data-input').classList.add('error');  erros=true; }
  if(!data)  { document.getElementById('err-data').classList.add('show');  document.getElementById('data-input').classList.add('error');  erros=true; }
  if(secoesAtivas.length===0) { mostrarToast('Selecione ao menos um módulo.'); erros=true; }
  if(erros) return;

  // Inicializa state
  Object.keys(state).forEach(k=>delete state[k]);
  Object.keys(obsMap).forEach(k=>delete obsMap[k]);
  Object.keys(numMap).forEach(k=>delete numMap[k]);
  moduloAtual = 0;
  secoesAtivas.forEach(sec => {
    ESTRUTURA[sec].eixos.forEach(e => e.itens.forEach(item => { state[item.id]=null; }));
  });
  totalItens = contarItens();

  const primeiroModulo = ESTRUTURA[secoesAtivas[0]];
  document.getElementById('check-title').textContent = placa.toUpperCase();
  document.getElementById('check-sub').textContent = primeiroModulo.label + ' · ' + tipoVeiculo;

  renderChecklist();
  show('view-checklist');
};

// ══ RENDERIZAR CHECKLIST ══
function renderChecklist() {
  const cont = document.getElementById('checklist-content');
  cont.innerHTML = '';

  const secKey = secoesAtivas[moduloAtual];
  const secAtual = ESTRUTURA[secKey];

  // Header do módulo atual
  const secLabel = document.createElement('div');
  secLabel.style.cssText = 'padding:14px 16px 4px;font-size:10px;font-family:"Barlow Condensed",sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:'+secAtual.cor+';';
  secLabel.textContent = '— ' + secAtual.label.toUpperCase() + ' —';
  cont.appendChild(secLabel);

  // Renderiza apenas a seção atual
  const secoesParaRender = [secKey];
  secoesParaRender.forEach((secKey,si) => {
    const sec = ESTRUTURA[secKey];
    sec.eixos.forEach((eixo, ei) => {
      const secDiv = document.createElement('div');
      secDiv.className = 'eixo-section';

      const hdr = document.createElement('div');
      hdr.className = 'eixo-header';
      hdr.innerHTML = `<div class="eixo-dot" style="background:${sec.cor}"></div><span class="eixo-name">${eixo.nome}</span>`;
      secDiv.appendChild(hdr);

      eixo.itens.forEach(item => {
        const div = document.createElement('div');
        div.className = 'check-item';
        div.id = 'item-'+item.id;

        if(item.tipo === 'pneu') {
          // Layout especial para pneus
          div.innerHTML = `
            <div class="check-item-top">
              <div>
                <div class="check-item-label">${item.label}</div>
                <div class="check-item-sub">${item.sub}</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
              <div>
                <div style="font-size:10px;color:var(--text3);margin-bottom:4px;">Nº a Fogo</div>
                <input class="num-input" type="text" style="width:100%;" placeholder="—" id="fogo-${item.id}" oninput="salvarNum('${item.id}','fogo',this.value)"/>
              </div>
              <div>
                <div style="font-size:10px;color:var(--text3);margin-bottom:4px;">TDI (mm)</div>
                <input class="num-input" type="number" step="0.1" style="width:100%;" placeholder="0.0" id="tdi-${item.id}" oninput="salvarNum('${item.id}','tdi',this.value)"/>
              </div>
            </div>
            <div style="margin-top:8px;">
              <div style="font-size:10px;color:var(--text3);margin-bottom:6px;">Estrutura</div>
              <div style="display:flex;gap:6px;">
                <button class="trio-btn trio-ok" data-id="${item.id}" data-val="ok" style="flex:1;" onclick="setVal('${item.id}','ok',this)">OK</button>
                <button class="trio-btn trio-at" data-id="${item.id}" data-val="at" style="flex:1;" onclick="setVal('${item.id}','at',this)">Atenção</button>
                <button class="trio-btn trio-sub" data-id="${item.id}" data-val="sub" style="flex:1;" onclick="setVal('${item.id}','sub',this)">Substituir</button>
                <button class="trio-btn trio-na" data-id="${item.id}" data-val="na" onclick="setVal('${item.id}','na',this)">N/A</button>
              </div>
            </div>
            <div class="obs-box" id="obs-${item.id}">
              <textarea class="obs-input" rows="2" placeholder="OBSERVAÇÃO..." id="txt-${item.id}"></textarea>
            </div>`;
        } else {
          // Layout padrão
          div.innerHTML = `
            <div class="check-item-top">
              <div style="flex:1;">
                <div class="check-item-label">${item.label}</div>
                <div class="check-item-sub">${item.sub}</div>
              </div>
              <div class="trio-group">
                <button class="trio-btn trio-ok" data-id="${item.id}" data-val="ok" onclick="setVal('${item.id}','ok',this)">✔ OK</button>
                <button class="trio-btn trio-at" data-id="${item.id}" data-val="at" onclick="setVal('${item.id}','at',this)">⚠ Atenção</button>
                <button class="trio-btn trio-sub" data-id="${item.id}" data-val="sub" onclick="setVal('${item.id}','sub',this)">↩ Substituir</button>
              </div>
            </div>
            <div class="obs-box" id="obs-${item.id}">
              <textarea class="obs-input" rows="2" placeholder="OBSERVAÇÃO..." id="txt-${item.id}"></textarea>
            </div>`;
        }

        secDiv.appendChild(div);
      });

      cont.appendChild(secDiv);

      if(ei < sec.eixos.length-1) {
        const sep = document.createElement('div'); sep.className='sep'; cont.appendChild(sep);
      }
    });

    if(si < secoesAtivas.length-1) {
      const sep = document.createElement('div'); sep.style.cssText='height:8px;'; cont.appendChild(sep);
    }
  });

  // Botão de ação — Seguir ou Finalizar
  const isUltimo = moduloAtual >= secoesAtivas.length - 1;
  const proximoLabel = isUltimo ? null : ESTRUTURA[secoesAtivas[moduloAtual+1]]?.label;
  const btn = document.createElement('button');
  btn.className = 'btn-finalizar';
  if(isUltimo) {
    btn.innerHTML = '✔ Revisar e Enviar';
    btn.style.background = '#0d5c38';
    btn.style.borderColor = 'var(--ok)';
  } else {
    btn.innerHTML = `Seguir para ${proximoLabel} <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`;
    btn.style.background = '#1e3a6e';
    btn.style.borderColor = 'var(--accent)';
  }
  btn.addEventListener('click', () => isUltimo ? tentarFinalizar() : irProximoModulo());
  cont.appendChild(btn);
  updateProgress();
}

// ══ INTERAÇÕES ══
window.setVal = function(id, val, btn) {
  const txtEl = document.getElementById('txt-'+id);
  if(txtEl) obsMap[id] = txtEl.value;
  state[id] = val;

  const item = document.getElementById('item-'+id);
  item.querySelectorAll('.trio-ok,.trio-at,.trio-sub').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  const obs = document.getElementById('obs-'+id);
  if(obs) (val==='at'||val==='sub') ? obs.classList.add('show') : obs.classList.remove('show');
  // N/A: desabilita campos de pneu visualmente
  if(val==='na') {
    const fogo = document.getElementById('fogo-'+id);
    const tdi  = document.getElementById('tdi-'+id);
    if(fogo) { fogo.value=''; fogo.disabled=true; fogo.style.opacity='0.3'; }
    if(tdi)  { tdi.value='';  tdi.disabled=true;  tdi.style.opacity='0.3'; }
  } else {
    const fogo = document.getElementById('fogo-'+id);
    const tdi  = document.getElementById('tdi-'+id);
    if(fogo) { fogo.disabled=false; fogo.style.opacity=''; }
    if(tdi)  { tdi.disabled=false;  tdi.style.opacity=''; }
  }
  updateProgress();
};

window.salvarNum = function(id, campo, val) {
  if(!numMap[id]) numMap[id]={};
  numMap[id][campo] = val;
};

function updateProgress() {
  const secKey = secoesAtivas[moduloAtual] || secoesAtivas[0];
  const itensMod = ESTRUTURA[secKey]?.eixos.flatMap(e=>e.itens) || [];
  const done = itensMod.filter(i=>state[i.id]!==null).length;
  const pct = itensMod.length > 0 ? Math.round(done/itensMod.length*100) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
}

// ══ VALIDAÇÃO E MODAL ══
function irProximoModulo() {
  // Salva obs em aberto do módulo atual
  const secKey = secoesAtivas[moduloAtual];
  ESTRUTURA[secKey].eixos.forEach(e => e.itens.forEach(item => {
    const ta = document.getElementById('txt-'+item.id);
    if(ta) obsMap[item.id] = ta.value;
  }));

  // Verifica se todos os itens do módulo atual foram preenchidos
  const pendentes = ESTRUTURA[secKey].eixos.flatMap(e => e.itens).filter(i => state[i.id]===null);
  if(pendentes.length > 0) {
    pendentes.forEach(item => {
      const el = document.getElementById('item-'+item.id);
      if(el) {
        el.style.borderColor='#cc2222';
        el.style.background='#1a1010';
        setTimeout(()=>{el.style.borderColor='';el.style.background='';},2500);
      }
    });
    document.getElementById('item-'+pendentes[0].id)?.scrollIntoView({behavior:'smooth',block:'center'});
    mostrarToast(`⚠ ${pendentes.length} item(ns) sem resposta.`);
    return;
  }

  // Avança para o próximo módulo
  moduloAtual++;
  const proxSec = ESTRUTURA[secoesAtivas[moduloAtual]];
  document.getElementById('check-title').textContent = document.getElementById('placa-input').value.toUpperCase();
  document.getElementById('check-sub').textContent = proxSec.label + ' · ' + tipoVeiculo;
  renderChecklist();
  document.getElementById('checklist-content').scrollTop = 0;
}

function tentarFinalizar() {
  // Salva obs em aberto
  secoesAtivas.forEach(sec => {
    ESTRUTURA[sec].eixos.forEach(e => e.itens.forEach(item => {
      const ta = document.getElementById('txt-'+item.id);
      if(ta) obsMap[item.id] = ta.value;
    }));
  });

  // Verifica apenas o último módulo (os anteriores já foram validados)
  const secAtual = secoesAtivas[moduloAtual];
  const pendentes = ESTRUTURA[secAtual].eixos.flatMap(e=>e.itens).filter(i=>state[i.id]===null);
  if(pendentes.length > 0) {
    pendentes.forEach(item => {
      const el = document.getElementById('item-'+item.id);
      if(el) { el.style.borderColor='#cc2222'; el.style.background='#1a1010'; setTimeout(()=>{el.style.borderColor='';el.style.background='';},2500); }
    });
    document.getElementById('item-'+pendentes[0].id)?.scrollIntoView({behavior:'smooth',block:'center'});
    mostrarToast(`⚠ ${pendentes.length} item(ns) sem resposta.`);
    return;
  }
  abrirModal();
}

function abrirModal() {
  const {ok,at,sub,na} = countState();
  const placa = document.getElementById('placa-input').value.toUpperCase();
  const data  = document.getElementById('data-input').value;
  document.getElementById('modal-sub').textContent = placa+' · '+new Date(data+'T12:00').toLocaleDateString('pt-BR');

  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <div class="modal-stats">
      <div class="mstat ok"><div class="mstat-num">${ok}</div><div class="mstat-lbl">OK</div></div>
      <div class="mstat at"><div class="mstat-num">${at}</div><div class="mstat-lbl">Atenção</div></div>
      <div class="mstat sub"><div class="mstat-num">${sub}</div><div class="mstat-lbl">Substituir</div></div>
    </div>`;

  // Lista atenção e substituição
  const atItems = [], subItems = [];
  secoesAtivas.forEach(sec => {
    ESTRUTURA[sec].eixos.forEach(e => e.itens.forEach(item => {
      if(state[item.id]==='at') atItems.push({sec:ESTRUTURA[sec].label, eixo:e.nome, label:item.label, sub:item.sub, obs:obsMap[item.id]||''});
      if(state[item.id]==='sub') subItems.push({sec:ESTRUTURA[sec].label, eixo:e.nome, label:item.label, sub:item.sub, obs:obsMap[item.id]||''});
    }));
  });

  if(subItems.length>0) {
    body.innerHTML += `<div class="modal-section-title" style="color:var(--sub);">↩ Substituição Necessária (${subItems.length})</div>`;
    subItems.forEach(i => {
      body.innerHTML += `<div class="modal-item sub"><div class="modal-item-cat">${i.sec} · ${i.eixo}</div><div class="modal-item-label">${i.label} — ${i.sub}</div>${i.obs?`<div class="modal-item-obs">📝 ${i.obs}</div>`:''}</div>`;
    });
  }
  if(atItems.length>0) {
    body.innerHTML += `<div class="modal-section-title" style="color:var(--atenc);margin-top:12px;">⚠ Requer Atenção (${atItems.length})</div>`;
    atItems.forEach(i => {
      body.innerHTML += `<div class="modal-item at"><div class="modal-item-cat">${i.sec} · ${i.eixo}</div><div class="modal-item-label">${i.label} — ${i.sub}</div>${i.obs?`<div class="modal-item-obs">📝 ${i.obs}</div>`:''}</div>`;
    });
  }
  if(atItems.length===0 && subItems.length===0) {
    body.innerHTML += `<div style="text-align:center;padding:20px;color:var(--ok);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;">✔ TUDO CONFORME!</div>`;
  }

  document.getElementById('modal-overlay').classList.add('show');
}

window.fecharModal = function() {
  document.getElementById('modal-overlay').classList.remove('show');
};

document.getElementById('btn-confirmar').addEventListener('click', confirmarEnvio);

async function confirmarEnvio() {
  fecharModal();
  const placa = document.getElementById('placa-input').value.toUpperCase();
  const data  = document.getElementById('data-input').value;
  const {ok,at,sub,na} = countState();
  const now = new Date();

  // Monta itens detalhados
  const itens = [];
  secoesAtivas.forEach(sec => {
    ESTRUTURA[sec].eixos.forEach(e => e.itens.forEach(item => {
      const dadoNum = numMap[item.id] || {};
      itens.push({
        secao: ESTRUTURA[sec].label,
        eixo: e.nome,
        item: item.label,
        posicao: item.sub,
        status: state[item.id],
        obs: obsMap[item.id]||'',
        ...(item.tipo==='pneu' ? {fogoNum:dadoNum.fogo||'',tdi:dadoNum.tdi||'',estrutura:state[item.id]} : {})
      });
    }));
  });

  const docData = {
    tipo: 'manutencao_corretiva',
    placa, tipoVeiculo,
    dataInspecao: data,
    timestamp: now.toISOString(),
    dataFormatada: now.toLocaleDateString('pt-BR'),
    horaFormatada: now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    secoesInspecionadas: secoesAtivas.map(s=>ESTRUTURA[s].label),
    totalOk: ok, totalAtencao: at, totalSubstituir: sub, totalNA: na,
    itens, enviado: true
  };

  try {
    // Garante que está autenticado antes de salvar
    if (!auth.currentUser) {
      await signInAnonymously(auth);
    }
    await addDoc(collection(db,'manutencao_corretiva'), docData);
    document.getElementById('success-info').innerHTML = `
      <div class="success-row"><span>Placa</span><span>${placa}</span></div>
      <div class="success-row"><span>Tipo</span><span>${tipoVeiculo}</span></div>
      <div class="success-row"><span>Data</span><span>${new Date(data+'T12:00').toLocaleDateString('pt-BR')}</span></div>
      <div class="success-row"><span>OK</span><span style="color:#2ed47a">${ok}</span></div>
      <div class="success-row"><span>Atenção</span><span style="color:#d29922">${at}</span></div>
      <div class="success-row"><span>Substituir</span><span style="color:#cc2222">${sub}</span></div>
      <div class="success-row"><span>Enviado em</span><span>${now.toLocaleString('pt-BR')}</span></div>`;
    // Registrar módulo como feito
    const secFeita = secoesAtivas[0];
    if (secFeita && !modulosFeitos.includes(secFeita)) modulosFeitos.push(secFeita);

    // Badge dos módulos feitos
    const feitosEl = document.getElementById('success-modulos-feitos');
    if(feitosEl) {
      feitosEl.innerHTML = modulosFeitos.map(m => {
        const mod = MODULOS_DISPONIVEIS.find(x=>x.mods===m);
        return mod ? `<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(46,212,122,0.12);border:1px solid rgba(46,212,122,0.3);color:#2ed47a;font-size:11px;padding:3px 10px;border-radius:20px;">${mod.icon} ${mod.label}</span>` : '';
      }).join(' ');
    }

    // Desabilitar btn se todos os módulos feitos
    const btnOutro = document.getElementById('btn-outro-modulo');
    if(btnOutro) {
      const todosConcluidos = MODULOS_DISPONIVEIS.every(m => modulosFeitos.includes(m.mods));
      btnOutro.disabled = todosConcluidos;
      btnOutro.style.opacity = todosConcluidos ? '0.4' : '1';
      btnOutro.style.cursor = todosConcluidos ? 'not-allowed' : 'pointer';
      btnOutro.textContent = todosConcluidos ? '✓ Todos os módulos concluídos' : '🔧 Inspecionar Outro Módulo';
    }

    show('view-sucesso');
  } catch(err) {
    console.error('Erro ao salvar:', err.code, err.message);
    mostrarToast('⚠ ' + (err.message || 'Erro ao salvar. Tente novamente.'));
  }
}

window.novaInspecao = function() {
  Object.keys(state).forEach(k=>delete state[k]);
  Object.keys(obsMap).forEach(k=>delete obsMap[k]);
  Object.keys(numMap).forEach(k=>delete numMap[k]);
  modulosFeitos = [];
  document.getElementById('placa-input').value = '';
  document.getElementById('data-input').value = new Date().toISOString().slice(0,10);
  show('view-home');
};

window.outroModulo = function() {
  Object.keys(state).forEach(k=>delete state[k]);
  Object.keys(obsMap).forEach(k=>delete obsMap[k]);
  Object.keys(numMap).forEach(k=>delete numMap[k]);
  moduloAtual = 0;
  renderBotoesModulo(); // atualiza botões mostrando quais faltam
  show('view-modulo');
};

// ══ LISTENERS PRINCIPAIS (após definição de todas as funções) ══

// Placa
document.getElementById('placa-input').addEventListener('change', function() {
  document.getElementById('err-placa').classList.remove('show');
  this.classList.remove('error');
  // Captura tipo do veículo pelo data-tipo do select
  const opt = this.options[this.selectedIndex];
  tipoVeiculo = opt ? opt.getAttribute('data-tipo') : '';
});



// Módulos — Freio/Pneu e Freio/Susp-Trans
document.querySelectorAll('.section-tab[data-mods]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.section-tab[data-mods]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    secoesAtivas = this.getAttribute('data-mods').split(',');
  });
});

// Seleciona o primeiro módulo por padrão
const _primeiroMod = document.querySelector('.section-tab[data-mods]');
if(_primeiroMod) {
  _primeiroMod.classList.add('active');
  secoesAtivas = _primeiroMod.getAttribute('data-mods').split(',');
}
document.getElementById('btn-back-checklist').addEventListener('click', () => show('view-home'));
document.getElementById('data-input').addEventListener('input', function() {
  document.getElementById('err-data').classList.remove('show');
  this.classList.remove('error');
});
document.getElementById('btn-iniciar').addEventListener('click', () => irParaModulos());
document.getElementById('btn-rever').addEventListener('click', () => fecharModal());
document.getElementById('btn-cancelar').addEventListener('click', () => fecharModal());
document.getElementById('btn-nova-inspecao').addEventListener('click', () => novaInspecao());
document.getElementById('btn-outro-modulo').addEventListener('click', () => outroModulo());
// btn-confirmar já tem listener acima

// ── IR PARA MÓDULOS ──
function renderBotoesModulo() {
  const container = document.getElementById('modulos-btns-container');
  if (!container) return;
  container.innerHTML = MODULOS_DISPONIVEIS.map(m => {
    const feito = modulosFeitos.includes(m.mods);
    return `<button class="btn-modulo${feito?' feito':''}" ${feito?'disabled':''} data-iniciar="${m.mods}" data-label="${m.label}">
      <div class="btn-modulo-icon">${m.icon}</div>
      <div style="flex:1;">
        <div class="btn-modulo-title">${m.label}</div>
        <div class="btn-modulo-sub">${m.sub}</div>
      </div>
      ${feito?'<span class="btn-modulo-badge">✓ Feito</span>':''}
    </button>`;
  }).join('');
}

function iniciarModulo(mods, label) {
  secoesAtivas = [mods];
  moduloAtual = 0;
  Object.keys(state).forEach(k=>delete state[k]);
  Object.keys(obsMap).forEach(k=>delete obsMap[k]);
  Object.keys(numMap).forEach(k=>delete numMap[k]);
  secoesAtivas.forEach(sec => {
    ESTRUTURA[sec].eixos.forEach(e => e.itens.forEach(item => { state[item.id]=null; }));
  });
  totalItens = contarItens();
  const placa = document.getElementById('placa-input').value.toUpperCase();
  document.getElementById('check-title').textContent = placa;
  document.getElementById('check-sub').textContent = label + ' · ' + tipoVeiculo;
  renderChecklist();
  show('view-checklist');
}

function irParaModulos() {
  const placa = document.getElementById('placa-input').value.trim();
  const data  = document.getElementById('data-input').value;
  let erros = false;
  if(!placa) { document.getElementById('err-placa').classList.add('show'); document.getElementById('placa-input').classList.add('error'); erros=true; }
  if(!data)  { document.getElementById('err-data').classList.add('show');  document.getElementById('data-input').classList.add('error');  erros=true; }
  if(erros) return;
  const opt = document.getElementById('placa-input').options[document.getElementById('placa-input').selectedIndex];
  tipoVeiculo = opt ? opt.getAttribute('data-tipo') : '';
  modulosFeitos = []; // reset ao iniciar nova inspeção
  document.getElementById('modulo-placa-title').textContent = placa;
  document.getElementById('modulo-data-sub').textContent = new Date(data+'T12:00').toLocaleDateString('pt-BR') + ' · ' + tipoVeiculo;
  renderBotoesModulo();
  show('view-modulo');
}

// ── LISTENERS MÓDULOS ──
document.getElementById('btn-back-modulo').addEventListener('click', () => show('view-home'));

// Delegação para botões de módulo gerados dinamicamente
document.addEventListener('click', function(e) {
  const btn = e.target.closest('button[data-iniciar]');
  if (!btn || btn.disabled) return;
  const mods = btn.getAttribute('data-iniciar');
  const label = btn.getAttribute('data-label');
  const mod = MODULOS_DISPONIVEIS.find(m => m.mods === mods);
  if (mod) iniciarModulo(mod.mods, mod.label);
});

function mostrarToast(msg) {
  let t = document.getElementById('toast-manut');
  if(!t) {
    t = document.createElement('div');
    t.id = 'toast-manut';
    t.style.cssText = 'position:absolute;bottom:80px;left:14px;right:14px;background:#cc2222;color:#fff;font-family:"Barlow",sans-serif;font-size:12px;font-weight:600;padding:12px 16px;border-radius:12px;z-index:200;text-align:center;';
    document.getElementById('main-screen').appendChild(t);
  }
  t.textContent = msg; t.style.display='block'; t.style.opacity='1';
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.style.transition='opacity 0.5s'; t.style.opacity='0'; setTimeout(()=>{t.style.display='none';t.style.transition='';},500); },3000);
}
</script>
