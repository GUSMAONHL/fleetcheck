<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Limpar Base — Manutenção</title>
<style>
  body { font-family: sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .card { background: #fff; border-radius: 12px; padding: 32px; max-width: 480px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
  h2 { color: #cc2222; margin-bottom: 8px; }
  p { color: #555; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
  .btn { padding: 14px 28px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 10px; }
  .btn-danger { background: #cc2222; color: #fff; }
  .btn-danger:hover { background: #aa1a1a; }
  .btn-danger:disabled { background: #ccc; cursor: not-allowed; }
  .btn-cancel { background: #eee; color: #555; }
  .log { margin-top: 20px; background: #f8f8f8; border-radius: 8px; padding: 14px; text-align: left; font-size: 12px; color: #444; max-height: 200px; overflow-y: auto; display: none; font-family: monospace; }
  .log.show { display: block; }
  .status { font-size: 13px; color: #888; margin-top: 12px; }
  .ok { color: #1a7a36; font-weight: 600; }
  .err { color: #cc2222; }
</style>
</head>
<body>
<div class="card">
  <h2>⚠️ Limpar Base de Dados</h2>
  <p>
    Esta ação irá <strong>deletar todos os registros</strong> de inspeção da coleção <code>manutencao_corretiva</code>,
    <strong>exceto</strong> os do veículo <strong>GBO1J82</strong>.
    <br/><br/>
    Esta ação <strong>não pode ser desfeita</strong>.
  </p>
  <button class="btn btn-danger" id="btn-limpar" onclick="confirmar()">🗑 Limpar Base Agora</button>
  <button class="btn btn-cancel" onclick="window.close()">Cancelar</button>
  <div class="status" id="status"></div>
  <div class="log" id="log"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app = initializeApp({
  apiKey: "AIzaSyDWR3Q1VxRpNn7cSGvoDK8VUkjB-_9pr6A",
  authDomain: "fleetcheck-nh.firebaseapp.com",
  projectId: "fleetcheck-nh",
  storageBucket: "fleetcheck-nh.firebasestorage.app",
  messagingSenderId: "767660468574",
  appId: "1:767660468574:web:940c5cf1164bcd9be707cf"
});
const db = getFirestore(app);
signInAnonymously(getAuth(app)).catch(console.error);

window.confirmar = async function() {
  if (!confirm('Tem certeza? Todos os registros exceto GBO1J82 serão deletados permanentemente.')) return;

  const btn = document.getElementById('btn-limpar');
  const status = document.getElementById('status');
  const log = document.getElementById('log');

  btn.disabled = true;
  btn.textContent = 'Deletando...';
  log.classList.add('show');
  log.innerHTML = 'Buscando registros...\n';
  status.textContent = '';

  try {
    const snap = await getDocs(collection(db, 'manutencao_corretiva'));
    const total = snap.docs.length;
    log.innerHTML += `Encontrados: ${total} registros\n`;

    let deletados = 0;
    let mantidos = 0;

    for (const docSnap of snap.docs) {
      const placa = (docSnap.data().placa || '').toUpperCase().trim();
      if (placa === 'GBO1J82') {
        log.innerHTML += `✔ Mantido: ${placa} (${docSnap.id.slice(0,8)}...)\n`;
        mantidos++;
      } else {
        await deleteDoc(doc(db, 'manutencao_corretiva', docSnap.id));
        log.innerHTML += `🗑 Deletado: ${placa} (${docSnap.id.slice(0,8)}...)\n`;
        deletados++;
      }
      log.scrollTop = log.scrollHeight;
    }

    status.innerHTML = `<span class="ok">✅ Concluído! ${deletados} registros deletados · ${mantidos} mantidos (GBO1J82)</span>`;
    btn.textContent = '✅ Limpeza Concluída';

  } catch(err) {
    console.error(err);
    status.innerHTML = `<span class="err">⚠️ Erro: ${err.message}</span>`;
    btn.disabled = false;
    btn.textContent = '🗑 Tentar Novamente';
  }
};
</script>
</body>
</html>
